        function initCanvas() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;
            
            const particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 2.5 + 0.5,
                    dx: (Math.random() - 0.5) * 0.5,
                    dy: (Math.random() - 0.5) * 0.5,
                    alpha: Math.random() * 0.6 + 0.1,
                    color: Math.random() > 0.5 ? '167, 139, 250' : '52, 211, 153'
                });
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    p.x += p.dx;
                    p.y += p.dy;
                    if (p.x < 0 || p.x > w) p.dx *= -1;
                    if (p.y < 0 || p.y > h) p.dy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `rgba(${p.color}, ${p.alpha})`;
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('resize', () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });
        }

                        desc: "你拥有极高的精神追求和想象力，但现实的平庸经常让你感到精神内耗。你渴望深刻的意义，但请记住，平凡的烟火气同样能滋养你的灵魂。" 
                    };
                }
            }
            else if (maxStress === s.StressSocial && s.StressSocial > s.StressSelf) {
                return { 
                    title: "提灯的守望人", 
                    subtitle: "你总是在照亮别人，却忘了灯油也会耗尽。", 
                    desc: "你拥有极高的共情能力，但在人际交往中过度消耗了自己。在森林中，你总是害怕别人迷路，却不知不觉压抑了自己的真实需求。请学会为自己划定边界，学会说“不”。" 
                };
            }
            else if (maxStress === s.StressSurvival && s.StressSurvival >= s.StressSelf) {
                if (s.C > s.E) {
                    return { 
                        title: "戴着重枷的圣殿骑士", 
                        subtitle: "责任是你的信仰，也是压垮你的铠甲。", 
                        desc: "你非常靠谱，对工作和物质有着本能的焦虑，总是强迫自己把一切做到最好。但这让你背负了太多不属于你的重担。卸下铠甲休息一下吧，天不会塌下来的。" 
                    };
                } else {
                    return { 
                        title: "披荆斩棘的开拓者", 
                        subtitle: "你的剑很锋利，但长期紧绷的弦容易断裂。", 
                        desc: "你极具行动力，面对现实的压力习惯于正面迎击、不断进取。但在不断的冲锋中，你忽略了身体和情绪的疲惫。放下剑，允许自己偶尔做一个软弱的凡人。" 
                    };
                }
            }
            // Extreme conditions
            else if (isHighStress && s.N > 4) {
                return { 
                    title: "逆流而上的破浪者", 
                    subtitle: "你在风暴中心嘶吼，急需一个停靠的港湾。", 
                    desc: "你目前的心理电量已经严重不足，处于濒临爆发或极度烦躁的边缘。你在抗争，但其实你更需要的是彻底的休息。去睡个好觉，或者去没有人的旷野大喊一声吧。" 
                };
            }
            else if (!isHighStress && s.O > 4) {
                return { 
                    title: "幻境中的寻梦人", 
                    subtitle: "现实太无趣，所以你选择住进梦里。", 
                    desc: "你有一种神奇的能力，能把现实的压力通过幻想和兴趣消解掉。虽然有时显得不够脚踏实地，但这种随性让你免受了许多折磨。保持你的童心，但也要记得偶尔看看脚下的路。" 
                };
            }
            else {
                return { 
                    title: "游刃有余的吟游诗人", 
                    subtitle: "世界是一个巨大的草台班子，而你在歌唱。", 
                    desc: "你的心理状态非常健康，能够较好地平衡现实压力与内心情绪。随和是你度过难关的法宝。请继续保持这份轻盈，享受这趟名为人生的旅程。" 
                };
            }
        }

        // Init
        render();
    </script>
